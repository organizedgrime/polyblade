[package]
name = "polyblade"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "pblade"
path = "src/main.rs"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Rendering
egui-winit = { version = "^0.27", default-features = false }
egui_glow = { version = "^0.27", features = ["winit"] }
egui = { version = "^0.27", default-features = false, features = ["bytemuck"] }
bytemuck = { version = "^1.7" }
glow = { version = "^0.13" }
glutin = { version = "^0.31" }
glutin-winit = { version = "^0.4" }
winit = { version = "0.29.15", default-features = false, features = ["rwh_06"] }
rwh_05 = { package = "raw-window-handle", version = "0.5.2", features = [
	"std",
] }

# Misc
log = { version = "^0.4" }
cgmath = { version = "^0.18", features = ["swizzle"] }
rand = "0.7"

[features]
defeault = ["wayland", "x11"]
# Enables Wayland support for winit.
wayland = ["winit/wayland", "egui_glow/wayland"]
# Enables x11 support for winit.
x11 = ["winit/x11", "egui_glow/x11"]
